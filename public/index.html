<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Montana MDT</title>
<link rel="stylesheet" href="/css/app.css">
</head>
<body>

<!-- ─── Navbar ──────────────────────────────────────────────────────────────── -->
<nav id="navbar">
  <img src="/images/logo.png" class="nav-logo" alt="Logo">

  <button class="nav-btn active" id="tab-mdt-btn" onclick="showTab('mdt')">
    <span class="nav-icon">🖥️</span> MDT
  </button>
  <button class="nav-btn" id="tab-logs-btn" onclick="showTab('logs')">
    <span class="nav-icon">📋</span> Logs
  </button>
  <button class="nav-btn" id="tab-unitmap-btn" onclick="showTab('unitmap')">
    <span class="nav-icon">🗺️</span> Unit Map
  </button>
  <button class="nav-btn" id="tab-notes-btn" onclick="showTab('notes')">
    <span class="nav-icon">📝</span> Notes
  </button>

  <div class="nav-spacer"></div>

  <div class="nav-user">
    <img id="nav-avatar" src="/images/logo.png" alt="Avatar">
    <span id="nav-username">Loading...</span>
  </div>
  <a href="/auth/logout" class="nav-logout">Sign Out</a>
</nav>

<!-- ─── App ─────────────────────────────────────────────────────────────────── -->
<div id="app">

  <!-- MDT Tab -->
  <div class="tab-page active" id="page-mdt">
    <div class="section-title">MDT — Mobile Data Terminal</div>

    <div class="mdt-actions">
      <button class="mdt-action-btn" data-form="citation" onclick="showForm('citation')">📄 Log Citation</button>
      <button class="mdt-action-btn" data-form="arrest"   onclick="showForm('arrest')">🔒 Log Arrest</button>
      <button class="mdt-action-btn" data-form="incident" onclick="showForm('incident')">📡 Log Incident</button>
      <button class="mdt-action-btn" data-form="warrant"  onclick="showForm('warrant')">⚠️ Log Warrant</button>
    </div>

    <!-- Citation Form -->
    <div class="form-panel" id="form-citation" style="display:none">
      <h2>📄 Log Citation</h2>
      <form onsubmit="submitCitation(event)">
        <div class="form-group">
          <label>Username <span style="color:var(--red)">*</span></label>
          <input type="text" name="username" required placeholder="Roblox username">
        </div>
        <div class="form-group">
          <label>Cited for <span style="color:var(--red)">*</span></label>
          <input type="text" name="citedFor" required placeholder="Violation(s)">
        </div>
        <div class="form-group">
          <label>Fine amount <span style="color:var(--red)">*</span></label>
          <input type="number" name="fineAmount" required placeholder="0" min="0">
        </div>
        <div class="form-group">
          <label>Department <span style="color:var(--red)">*</span></label>
          <select name="department" id="dept-citation" required>
            <option value="">Select department...</option>
          </select>
        </div>
        <div class="form-group">
          <label>Vehicle (optional)</label>
          <div class="vehicle-search-wrap">
            <input type="text" id="vehicle-search-input" placeholder="Search by year, make, or model...">
            <div class="vehicle-dropdown" id="vehicle-dropdown"></div>
          </div>
          <div id="vehicle-selected-wrap"></div>
        </div>
        <div id="vehicle-extra-fields" style="display:none">
          <div class="form-row">
            <div class="form-group">
              <label>License Plate <span style="color:var(--red)">*</span></label>
              <input type="text" name="licensePlate" placeholder="ABC-1234">
            </div>
            <div class="form-group">
              <label>Color <span style="color:var(--red)">*</span></label>
              <input type="text" name="color" placeholder="e.g. Black">
            </div>
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-submit">✓ Submit</button>
          <button type="button" class="btn-cancel" onclick="cancelForm('citation')">✕ Cancel</button>
        </div>
      </form>
    </div>

    <!-- Arrest Form -->
    <div class="form-panel" id="form-arrest" style="display:none">
      <h2>🔒 Log Arrest</h2>
      <form onsubmit="submitArrest(event)">
        <div class="form-group">
          <label>Username <span style="color:var(--red)">*</span></label>
          <input type="text" name="username" required placeholder="Roblox username">
        </div>
        <div class="form-group">
          <label>Charge(s) <span style="color:var(--red)">*</span></label>
          <textarea name="charges" required placeholder="List all charges..."></textarea>
        </div>
        <div class="form-group">
          <label>Department <span style="color:var(--red)">*</span></label>
          <select name="department" id="dept-arrest" required>
            <option value="">Select department...</option>
          </select>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-submit">✓ Submit</button>
          <button type="button" class="btn-cancel" onclick="cancelForm('arrest')">✕ Cancel</button>
        </div>
      </form>
    </div>

    <!-- Incident Form -->
    <div class="form-panel" id="form-incident" style="display:none">
      <h2>📡 Log Incident</h2>
      <form onsubmit="submitIncident(event)">
        <div class="form-group">
          <label>LEO(s) involved (Callsign | Username) <span style="color:var(--red)">*</span></label>
          <textarea name="leos" required placeholder="e.g. 1-Adam-12 | JohnDoe, 2-Baker-4 | JaneSmith"></textarea>
        </div>
        <div class="form-group">
          <label>Location <span style="color:var(--red)">*</span></label>
          <input type="text" name="location" required placeholder="e.g. Main St & 5th Ave">
        </div>
        <div class="form-group">
          <label>Description <span style="color:var(--red)">*</span></label>
          <textarea name="description" required placeholder="Describe the incident..." style="min-height:120px"></textarea>
        </div>
        <div class="form-group">
          <label>Department <span style="color:var(--red)">*</span></label>
          <select name="department" id="dept-incident" required>
            <option value="">Select department...</option>
          </select>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-submit">✓ Submit</button>
          <button type="button" class="btn-cancel" onclick="cancelForm('incident')">✕ Cancel</button>
        </div>
      </form>
    </div>

    <!-- Warrant Form -->
    <div class="form-panel" id="form-warrant" style="display:none">
      <h2>⚠️ Log Warrant</h2>
      <form onsubmit="submitWarrant(event)">
        <div class="form-group">
          <label>Username <span style="color:var(--red)">*</span></label>
          <input type="text" name="username" required placeholder="Roblox username">
        </div>
        <div class="form-group">
          <label>Wanted for <span style="color:var(--red)">*</span></label>
          <textarea name="wantedFor" required placeholder="List reason(s) for warrant..."></textarea>
        </div>
        <div class="form-group">
          <label>Additional info (optional)</label>
          <textarea name="additionalInfo" placeholder="Any additional details..."></textarea>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-submit">✓ Submit</button>
          <button type="button" class="btn-cancel" onclick="cancelForm('warrant')">✕ Cancel</button>
        </div>
      </form>
    </div>

    <!-- Active Warrants -->
    <div class="calls-section">
      <div class="calls-header">
        <div class="section-title" style="margin:0;border:none">⚠️ Active Warrants</div>
      </div>
      <div class="calls-list" id="active-warrants-list">
        <div class="no-calls">Loading warrants...</div>
      </div>
    </div>

    <!-- 911 Calls -->
    <div class="calls-section">
      <div class="calls-header">
        <div class="section-title" style="margin:0;border:none">🚨 Active 911 Calls</div>
      </div>
      <div class="calls-list" id="calls-list">
        <div class="no-calls">Loading calls...</div>
      </div>
    </div>
  </div>

  <!-- Logs Tab -->
  <div class="tab-page" id="page-logs">
    <div class="section-title">Logs</div>
    <div class="logs-tabs">
      <button class="log-tab-btn active" data-logtab="citation" onclick="switchLogTab('citation')">Citations</button>
      <button class="log-tab-btn"        data-logtab="arrest"   onclick="switchLogTab('arrest')">Arrests</button>
      <button class="log-tab-btn"        data-logtab="incident" onclick="switchLogTab('incident')">Incidents</button>
      <button class="log-tab-btn"        data-logtab="warrant"  onclick="switchLogTab('warrant')">Warrants</button>
    </div>
    <div class="search-bar">
      <input type="text" id="log-search" placeholder="Search by Log ID, Roblox username, or Discord username..." oninput="loadLogs()">
    </div>
    <div class="log-list" id="log-list">
      <div class="empty">Loading...</div>
    </div>
  </div>

  <!-- Unit Map Tab -->
  <div class="tab-page" id="page-unitmap">
    <div class="section-title">Unit Map — Live</div>
    <div class="map-controls">
      <button class="map-ctrl-btn" data-mapmode="sheriff" onclick="setMapMode('sheriff')">🟡 Sheriff Units</button>
      <button class="map-ctrl-btn" data-mapmode="police"  onclick="setMapMode('police')">🔵 Police Units</button>
    </div>
    <div id="map-container">
      <img id="map-img" src="/images/erlc-map.webp" alt="ERLC Map">
      <div id="map-overlay"></div>
    </div>
  </div>

  <!-- Notes Tab -->
  <div class="tab-page" id="page-notes">
    <div class="notes-header">
      <div class="section-title" style="margin:0;border:none">My Notes</div>
      <button class="btn-create-note" onclick="toggleNoteForm()">+ Create Note</button>
    </div>
    <div class="note-form-wrap" id="note-form-wrap">
      <form onsubmit="submitNote(event)">
        <div class="form-group">
          <label>Note <span style="color:var(--red)">*</span></label>
          <textarea name="noteText" required placeholder="Write your note here..." style="min-height:100px"></textarea>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-submit">✓ Save Note</button>
          <button type="button" class="btn-cancel" onclick="toggleNoteForm()">✕ Cancel</button>
        </div>
      </form>
    </div>
    <div class="notes-list" id="notes-list">
      <div class="empty">No notes yet.</div>
    </div>
  </div>

</div>

<div id="toast-container"></div>

<script src="/js/app.js"></script>
<script>
  // Patch init to populate dept dropdowns after user loads
  const _origInit = init;
  init = async function() {
    await _origInit();
    await populateDeptDropdowns();
  };
</script>
</body>
</html>
