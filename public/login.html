<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Montana MDT — Login</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1d2e;
    font-family: 'Segoe UI', sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    background-image: radial-gradient(ellipse at center, #1e2340 0%, #0d0f1a 100%);
  }
  .card {
    background: #1e2340;
    border: 1px solid #2e3460;
    border-radius: 12px;
    padding: 48px 40px;
    text-align: center;
    width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .logo { width: 100px; height: 100px; object-fit: contain; margin-bottom: 24px; border-radius: 50%; }
  h1 { color: #fff; font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  p { color: #8890b0; font-size: 13px; margin-bottom: 32px; line-height: 1.5; }
  .btn-discord {
    display: inline-flex; align-items: center; gap: 10px;
    background: #5865F2; color: #fff; text-decoration: none;
    padding: 13px 28px; border-radius: 8px; font-size: 15px; font-weight: 600;
    transition: background 0.2s;
  }
  .btn-discord:hover { background: #4752c4; }
  .btn-discord svg { width: 22px; height: 22px; fill: #fff; }
  .error { color: #ff6b6b; font-size: 13px; margin-top: 16px; }
  .expired { color: #ffd166; font-size: 13px; margin-top: 16px; }
  .divider { border-top: 1px solid #2e3460; margin: 28px 0; }
  .footer { color: #4a5080; font-size: 11px; }
</style>
</head>
<body>
<div class="card">
  <img src="/images/logo.png" class="logo" alt="Logo">
  <h1>Montana MDT</h1>
  <p>Authorized personnel only.<br>Sign in with your Discord account to continue.</p>
  <a href="/auth/discord" class="btn-discord">
    <svg viewBox="0 0 71 55" xmlns="http://www.w3.org/2000/svg"><path d="M60.1 4.9A58.6 58.6 0 0 0 45.5.4a41 41 0 0 0-1.8 3.7 54.2 54.2 0 0 0-16.3 0A38.5 38.5 0 0 0 25.6.4 58.5 58.5 0 0 0 11 4.9C1.6 19.1-.9 33 .3 46.7a59 59 0 0 0 18 9.1 44.7 44.7 0 0 0 3.9-6.3 38.4 38.4 0 0 1-6.1-2.9l1.5-1.1a42 42 0 0 0 35.8 0l1.5 1.1a38.3 38.3 0 0 1-6.1 2.9 44.5 44.5 0 0 0 3.9 6.3 58.8 58.8 0 0 0 18-9.1C71.9 33 69 19 60.1 4.9ZM23.8 38.4c-3.5 0-6.4-3.2-6.4-7.2s2.8-7.2 6.4-7.2c3.5 0 6.4 3.2 6.4 7.2s-2.9 7.2-6.4 7.2Zm23.4 0c-3.5 0-6.4-3.2-6.4-7.2s2.8-7.2 6.4-7.2c3.5 0 6.4 3.2 6.4 7.2s-2.9 7.2-6.4 7.2Z"/></svg>
    Sign in with Discord
  </a>
  <div id="msg"></div>
  <div class="divider"></div>
  <div class="footer">Montana State Roleplay &mdash; Law Enforcement MDT</div>
</div>
<script>
  const p = new URLSearchParams(location.search);
  if (p.get('error')) document.getElementById('msg').innerHTML = '<div class="error">Authentication failed. Please try again.</div>';
  if (p.get('expired')) document.getElementById('msg').innerHTML = '<div class="expired">Your session has expired. Please sign in again.</div>';
</script>
</body>
</html>
